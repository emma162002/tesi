name: tesi
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # PyTorch (install manually with correct CUDA version for your system)
    # Local/cluster: pip install torch==2.1.0 --index-url https://download.pytorch.org/whl/cu118
    # Colab: already installed
    - torch>=2.0.0
    - torchvision
    - torchaudio

    # Medical imaging — core stack
    - monai[all]>=1.3.0
    - nnunetv2
    - nibabel>=5.1.0
    - SimpleITK

    # Scientific computing
    - numpy>=1.24
    - scipy>=1.11
    - scikit-image>=0.21
    - scikit-learn>=1.3
    - pandas>=2.0

    # Config & logging
    - pyyaml>=6.0
    - tensorboard>=2.14
    - tqdm

    # Visualization
    - matplotlib>=3.7
    - seaborn

    # Utilities
    - einops
    - timm
    - connected-components-3d

    # LLM report generation (existing feature)
    - anthropic
    - openai
    - ollama
    - transformers
    - accelerate

    # Development
    - jupyter
    - ipywidgets
