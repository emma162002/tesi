# Few-shot prototypical network config

model:
  model_type:   unet
  in_channels:  1
  num_classes:  2    # binary: 0=bg, 1=tumor (simpler for few-shot)
  features:     [32, 64, 128, 256, 512]
  dropout:      0.1
  img_size:     [96, 96, 96]

optimizer:
  lr:           0.0001
  weight_decay: 0.00001

training:
  epochs:      100    # fewer epochs — episodic training converges faster
  val_every:   5
  batch_size:  1      # one episode per step
  num_workers: 4

fewshot:
  n_shot:       5     # K: number of support examples per episode
  n_query:      4     # Q: number of query images per episode
  n_episodes:   200   # episodes per epoch
  n_val_eps:    50    # episodes for validation

data:
  data_dir:  "/content/drive/MyDrive/tesi/data/nnunet_raw/Dataset007_Pancreas"
  val_fold:  0
  num_folds: 5
  patch_size: [96, 96, 96]

# Optional: initialize backbone from pretrained encoder
pretrained_encoder: null   # set to path of encoder_pretrained.pth
