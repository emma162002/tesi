# Base configuration — shared across all experiments
# Override specific keys in experiment-specific configs

model:
  model_type:         unet          # 'unet' | 'swinunetr'
  in_channels:        1
  num_classes:        3             # 0=bg, 1=pancreas, 2=tumor
  features:           [32, 64, 128, 256, 512]
  dropout:            0.1
  img_size:           [96, 96, 96]  # patch size
  pretrained_encoder: null          # path to MAE pretrained encoder

loss:
  loss_type:          tumor_focused  # 'dice_ce' | 'tumor_focused'
  num_classes:        3
  dice_weight:        0.5
  ce_weight:          0.5
  focal_gamma:        2.0
  tumor_weight:       3.0
  class_weights:      null          # [1.0, 1.0, 5.0] to upweight tumor

optimizer:
  lr:           0.0001
  weight_decay: 0.00001

scheduler:
  eta_min: 0.000001

training:
  epochs:      300
  val_every:   5
  batch_size:  2
  num_workers: 4          # reduce to 2 on Colab

data:
  data_dir:       "/content/drive/MyDrive/tesi/data/nnunet_raw/Dataset007_Pancreas"
  val_fold:       0
  num_folds:      5
  cache_rate:     0.0     # set to 0.5 if you have >16GB RAM
  patch_size:     [96, 96, 96]
