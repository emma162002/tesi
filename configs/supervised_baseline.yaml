# Fully supervised baseline (upper-bound reference)
# All training cases have full pixel-level annotations

model:
  model_type:   unet
  in_channels:  1
  num_classes:  3
  features:     [32, 64, 128, 256, 512]
  dropout:      0.1
  img_size:     [96, 96, 96]

loss:
  loss_type:    tumor_focused
  num_classes:  3
  focal_gamma:  2.0
  tumor_weight: 3.0

optimizer:
  lr:           0.0001
  weight_decay: 0.00001

training:
  epochs:      300
  val_every:   5
  batch_size:  2
  num_workers: 4

data:
  data_dir:   "/content/drive/MyDrive/tesi/data/nnunet_raw/Dataset007_Pancreas"
  val_fold:   0
  num_folds:  5
  cache_rate: 0.0
  patch_size: [96, 96, 96]
